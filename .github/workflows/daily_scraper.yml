name: Daily Opportunity Scraper

on:
    schedule:
        - cron: "0 6 * * *" # Runs every day at 6 AM UTC
    workflow_dispatch: # Also allows manual trigger from GitHub

jobs:
    scrape:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  cd backend
                  pip install -r requirements.txt

            - name: Run scraper
              env:
                  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
              run: |
                  cd backend
                  python scraper.py

            - name: Commit updated database
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add backend/opportunities.db || true
                  git diff --staged --quiet || git commit -m "Auto: daily scraper update $(date +'%Y-%m-%d')"
                  git push || true
